<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ── -->
    <title>TripPlanner — Plan journeys, not just routes</title>
    <meta name="description" content="India's intelligent trip planning platform. Discover stops, hotels, and local guides along every route." />
    <meta name="theme-color" content="#0d47a1" />

    <!-- ── OG / Social ── -->
    <meta property="og:title" content="TripPlanner — Plan journeys, not just routes" />
    <meta property="og:description" content="Discover every stop worth making between your source and destination." />
    <meta property="og:type" content="website" />

    <!-- ── FONTS ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ── LEAFLET CSS ── -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- ── FAVICON (emoji fallback) ── -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐇</text></svg>"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
